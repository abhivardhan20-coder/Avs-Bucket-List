<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | AV's Bucket List</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: #0f0f0f;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #f3f4f6;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      color: #9ca3af;
      margin-bottom: 24px;
    }
    .info {
      background: rgba(55, 65, 81, 0.5);
      border-left: 4px solid #ef4444;
      padding: 16px;
      border-radius: 6px;
      text-align: left;
      font-size: 14px;
      color: #d1d5db;
    }
    .retry-btn {
      margin-top: 24px;
      padding: 12px 24px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.3s ease;
    }
    .retry-btn:hover {
      background: #dc2626;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>
      We couldn't reach the server. Your previously loaded content is still available,
      but new requests require an internet connection.
    </p>
    <div class="info">
      <strong>Quick tip:</strong> Your watchlist and watched shows are saved locally. 
      They'll sync automatically when you're back online.
    </div>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
  </div>
</body>
</html>
