# ============================================================================
# NGINX CONFIGURATION - PRODUCTION
# ============================================================================
# High-performance, secure, production-ready configuration for AVS Bucket List
#
# Install Nginx:
#   Ubuntu/Debian: apt-get install nginx
#   macOS: brew install nginx
#   CentOS/RHEL: yum install nginx
#
# Enable this config:
#   sudo cp nginx.conf /etc/nginx/sites-available/avs-bucket-list
#   sudo ln -s /etc/nginx/sites-available/avs-bucket-list /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# ============================================================================

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;
    
    # Allow Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# ============================================================================
# MAIN HTTPS SERVER
# ============================================================================

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    server_name yourdomain.com www.yourdomain.com;
    
    # ========================================================================
    # SSL/TLS CONFIGURATION
    # ========================================================================
    
    # SSL Certificate (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    
    # SSL Protocol and Ciphers (High Security)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!DSS;
    ssl_prefer_server_ciphers on;
    
    # SSL Session Caching
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # OCSP Stapling (better security)
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/yourdomain.com/chain.pem;
    
    # ========================================================================
    # LOGGING
    # ========================================================================
    
    access_log /var/log/nginx/avs-bucket-list-access.log combined;
    error_log /var/log/nginx/avs-bucket-list-error.log warn;
    
    # Don't log health checks
    map $request_uri $loggable {
        default 1;
        ~^/health$ 0;
        ~^/api/monitoring/health$ 0;
        ~^/api/monitoring/readiness$ 0;
        ~^/api/monitoring/liveness$ 0;
    }
    
    access_log /var/log/nginx/avs-bucket-list-access.log combined if=$loggable;
    
    # ========================================================================
    # SECURITY HEADERS
    # ========================================================================
    
    # Strict Transport Security
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Content Security Policy (Strict)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'strict-dynamic'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://oauth2.googleapis.com https://api.themoviedb.org https://www.omdbapi.com; frame-ancestors 'none';" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Disable iFrame embedding
    add_header X-Frame-Options "DENY" always;
    
    # XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Referrer Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Permissions Policy
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    
    # ========================================================================
    # PERFORMANCE & CACHING
    # ========================================================================
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/x-icon;
    
    # Client body buffer size (for file uploads)
    client_max_body_size 10M;
    
    # Timeouts
    client_header_timeout 20s;
    client_body_timeout 20s;
    send_timeout 20s;
    
    # ========================================================================
    # FRONTEND - STATIC FILES & SPA
    # ========================================================================
    
    root /var/www/avs-bucket-list/dist;
    index index.html index.htm;
    
    # Cache busting for production builds
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Service Worker (short cache)
    location ~ ^/sw\.js$ {
        expires 0;
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }
    
    # App Shell (short cache)
    location ~ ^/(index\.html|manifest\.json|robots\.txt|sitemap\.xml)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # SPA routing - return index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # ========================================================================
    # API REVERSE PROXY
    # ========================================================================
    
    # API endpoints
    location /api/ {
        # Enable WebSocket upgrade
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Proxy settings
        proxy_pass http://backend:8000;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 24 4k;
        
        # Preserve original request information
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header X-Request-ID $request_id;
        
        # Timeouts for backend
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Don't cache API responses
        proxy_no_cache $http_cache_control;
        proxy_cache_bypass $http_pragma $http_authorization;
        
        # Error handling
        proxy_intercept_errors on;
    }
    
    # ========================================================================
    # HEALTH CHECK ENDPOINTS (No caching)
    # ========================================================================
    
    location ~ ^/(health|api/monitoring/health|api/monitoring/readiness|api/monitoring/liveness)$ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
        
        # Don't log health checks
        access_log off;
    }
    
    # ========================================================================
    # METRICS ENDPOINT (Prometheus)
    # ========================================================================
    
    location /api/monitoring/metrics {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Restrict access to monitoring systems
        allow 127.0.0.1;       # Local monitoring
        allow 10.0.0.0/8;      # Internal network
        deny all;
    }
    
    # ========================================================================
    # ERROR PAGES
    # ========================================================================
    
    # 404 Not Found - return index.html for SPA
    error_page 404 =200 /index.html;
    
    # 500+ Server Errors
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
    
    # ========================================================================
    # SECURITY: BLOCK UNWANTED REQUESTS
    # ========================================================================
    
    # Block access to hidden files and directories
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Block access to common admin areas
    location ~ ^/(admin|wp-admin|wp-login|cPanel|cpanel) {
        deny all;
        access_log off;
    }
    
    # Block access to common backup files
    location ~ \.(bak|config|sql|fla|psd|ini|log|sh|inc|swp|dist)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # ========================================================================
    # RATE LIMITING
    # ========================================================================
    
    # Define rate limit zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    
    # Apply rate limiting
    limit_req zone=api burst=50 nodelay;
}

# ============================================================================
# UPSTREAM CONFIGURATION (Docker/Internal)
# ============================================================================
#
# If using Docker, add to /etc/nginx/nginx.conf in http {} block:
#
# upstream backend {
#     server backend:8000;
#     keepalive 32;
# }
#
# ============================================================================

# ============================================================================
# CERTBOT RENEWAL (Let's Encrypt)
# ============================================================================
#
# Install Certbot:
#   sudo apt-get install certbot python3-certbot-nginx
#
# Create certificate:
#   sudo certbot certonly -a nginx -d yourdomain.com -d www.yourdomain.com
#
# Renew automatically (cron):
#   0 3 * * * /usr/bin/certbot renew --quiet
#   1 3 * * * /bin/systemctl reload nginx
#
# ============================================================================
